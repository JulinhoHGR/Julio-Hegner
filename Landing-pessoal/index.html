<!doctype html>
<html lang="pt-br" class="">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perfil - Julio Hegner</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="container">
      <div id="profile">
        <img src="assets/avatar.png" alt="Avatar" />
        <p>@HegnerJulio</p>
      </div>

      <div id="switch">
        <span id="switch-label">Light</span>
        <button type="button" aria-label="Alternar tema"></button>
      </div>

      <ul>
        <li>
          <a href="https://github.com/JulinhoHGR" target="_blank"
            >Perfil no GitHub</a
          >
        </li>
        <li>
          <a
            href="https://www.linkedin.com/in/julio-hegner-a540721b7/"
            target="_blank"
            >Perfil no LinkedIn</a
          >
        </li>
        <li><a href="mailto:juliohegnervieira@hotmail.com">Email</a></li>
        <li>
          <a href="https://wa.me/5551993624587" target="_blank">Whatsapp</a>
        </li>
      </ul>

      <div id="social-links">
        <a href="https://www.facebook.com/julio.hegner" target="_blank">
          <ion-icon name="logo-facebook"></ion-icon>
        </a>
        <a href="https://www.instagram.com/hegner_julio" target="_blank">
          <ion-icon name="logo-instagram"></ion-icon>
        </a>
        <a
          href="https://www.linkedin.com/in/julio-hegner-a540721b7/"
          target="_blank"
        >
          <ion-icon name="logo-linkedin"></ion-icon>
        </a>
        <a href="https://github.com/TM-THE-MONKEYS" target="_blank">
          <ion-icon name="logo-github"></ion-icon>
        </a>
      </div>
    </div>

    <script
      type="module"
      src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.js"
    ></script>
    <script>
      const btn = document.querySelector("#switch button");
      const label = document.getElementById("switch-label");
      const html = document.documentElement;

      btn.addEventListener("click", () => {
        html.classList.toggle("light");
        label.textContent = html.classList.contains("light") ? "Dark" : "Light";
      });
    </script>
  </body>
</html>
